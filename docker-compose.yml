services:
  db:
    image: postgres:15-alpine
    container_name: aqua_db
    environment:
      POSTGRES_DB: aquaculture_db
      POSTGRES_USER: aqua_user
      POSTGRES_PASSWORD: aqua_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: aqua_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      # Inject Django settings variables directly to the container
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-secret-key-123
      - DB_NAME=aquaculture_db
      - DB_USER=aqua_user
      - DB_PASSWORD=aqua_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  # Persistent volume for the PostgreSQL database
  postgres_data:
