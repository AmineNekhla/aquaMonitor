services:
  db:
    image: postgres:15-alpine
    container_name: aqua_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aqua_user} -d ${DB_NAME:-aquaculture_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: aqua_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  # Persistent volume for the PostgreSQL database
  postgres_data:
