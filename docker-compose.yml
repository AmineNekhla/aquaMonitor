services:
  db:
    image: postgres:15-alpine
    container_name: aqua_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aqua_user} -d ${DB_NAME:-aquaculture_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai:
    build: ./ai_service
    container_name: aqua_ai
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./ai_service/models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8001/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s #H: more time given before health check (for efficient web app startup due to dependency)

  web:
    build: .
    container_name: aqua_web
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      AI_SERVICE_URL: http://ai:8001
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  celery_worker:
    build: .
    container_name: aqua_celery_worker
    command: celery -A aquaculture worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      - db
      - redis
      - web
    restart: always

  celery_beat:
    build: .
    container_name: aqua_celery_beat
    command: celery -A aquaculture beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      - db
      - redis
      - web
    restart: always

  redis:
    image: redis:7-alpine
    container_name: aqua_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

volumes:
  # Persistent volume for the PostgreSQL database
  postgres_data:
