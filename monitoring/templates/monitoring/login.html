<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – AquaMonitor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
<body class="login-body d-flex align-items-center justify-content-center">

  <div class="login-card card shadow-lg p-4">

    <!-- Brand -->
    <div class="text-center mb-4">
      <i class="bi bi-water login-icon"></i>
      <h4 class="fw-bold mt-2 text-teal">AquaMonitor</h4>
      <p class="text-muted small">Smart Aquaculture Monitoring System</p>
    </div>

    <!-- Error messages from Django -->
    {% if form.errors %}
    <div class="alert alert-danger py-2 small">
      Invalid username or password. Please try again.
    </div>
    {% endif %}

    <!-- Login form -->
    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label for="id_username" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" id="id_username"
                 class="form-control" placeholder="Enter username" autofocus required />
        </div>
      </div>

      <div class="mb-4">
        <label for="id_password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="id_password"
                 class="form-control" placeholder="Enter password" required />
        </div>
      </div>

      <!-- Hidden redirect field -->
      <input type="hidden" name="next" value="{{ next }}" />

      <button type="submit" class="btn btn-teal w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
